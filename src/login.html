<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - Dart Sass 프로젝트</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div data-common-header data-right-href="index.html" data-right-label="홈으로"></div>

  <!-- 로그인 컨테이너 -->
  <main class="container">
    <div class="login-wrapper">
      <div class="login-card">
        <h1 class="login-title">로그인</h1>
        <p class="login-subtitle">계정으로 로그인하세요</p>

        <form class="login-form" id="loginForm">
          <div class="form-group">
            <label for="email" class="form-label">이메일</label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              class="form-input" 
              placeholder="이메일을 입력하세요"
              required
            >
          </div>

          <div class="form-group">
            <label for="password" class="form-label">비밀번호</label>
            <input 
              type="password" 
              id="password" 
              name="password" 
              class="form-input" 
              placeholder="비밀번호를 입력하세요"
              required
            >
          </div>

          <div class="form-group-checkbox">
            <input 
              type="checkbox" 
              id="remember" 
              name="remember" 
              class="form-checkbox"
            >
            <label for="remember" class="form-checkbox-label">로그인 상태 유지</label>
          </div>

          <button type="submit" class="btn-submit">로그인</button>
        </form>

        <div class="login-footer">
          <a href="#" class="login-link">비밀번호를 잊으셨나요?</a>
          <span class="divider">|</span>
          <a href="#" class="login-link">회원가입</a>
        </div>
      </div>
    </div>
  </main>

  <div data-common-footer></div>

  <script src="js/app.js"></script>
</body>
</html>
