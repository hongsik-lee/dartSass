    const boardData = [
      { num: 1, title: "[중요] 서비스 점검 예정 안내", date: "2026-03-10", views: 1234 },
      { num: 2, title: "새 기능 추가: 다크 모드 지원", date: "2026-03-09", views: 892 },
      { num: 3, title: "Dart Sass 마이그레이션 완료", date: "2026-03-08", views: 654 }
    ];

    const boardListElement = document.getElementById('boardList');
    let listHTML = '';
    boardData.forEach(function(item){
      listHTML += `
        <li class="board-item">
          <div class="board-num">${item.num}</div>
          <div class="board-content">
            <p class="board-title"><a href="#">${item.title}</a></p>
            <p class="board-meta">${item.data} · 조회 ${item.views}회</p>
          </div>
        </li> 
      `
    });

    boardListElement.innerHTML = listHTML;
